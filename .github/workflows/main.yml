name: Sky task every day update

on:
  schedule:
    - cron: '10,20,30,40 23,16,5 * * *'
  workflow_dispatch:

jobs:
  
  build:
    
    runs-on: ubuntu-latest
    
    env:
      TZ: Asia/Shanghai
      UPSTREAM_REPO: https://github.com/xiaoyanu/sky-auto
    
    steps:
      
      - name: Checkout
        uses: actions/checkout@v3
      
      - name: add upstream remote
        run: |
          git remote add upstream $UPSTREAM_REPO || git remote set-url upstream $UPSTREAM_REPO
          git remote -v
      
      - name: Fetch upstream
        run: |
          git fetch upstream
          git fetch upstream main:upstream-main || git fetch upstream master:upstream-master || echo "No main/master branch found"
      
      - name: Sync with upstream
        run: |
          git reset --hard upstream-main || git reset --hard upstream-master || echo "Using current branch"
      
      - name: import py 3.7
        uses: actions/setup-python@v1
        with:
           python-version: 3.10.18

      - name: install python module
        run: pip3 install -r requirements.txt

      - name: run python script
        run: 
          python3 main.py

      - name: commit github
        run: |
          git config --global user.email action@github.com
          git config --global user.name GitHub Action
          git add .
          time=$(date "+%Y-%m-%d %H:%M:%S")
          git commit -m "${time} 自动更新" -a
        
      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
